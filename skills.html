<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skills</title>

<style>

/* BODY */
body{
    margin:0;
    font-family:Arial, sans-serif;
    background: linear-gradient(135deg, #f5c6aa, #f7a1a1);
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 50px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.nav-links{
    display:flex;
    gap:25px;
}

.nav-links a{
    text-decoration:none;
    color:black;
    font-weight:500;
}

.nav-links a:hover{
    color:blue;
}

/* CONTAINER */
.container{
    max-width:1000px;
    margin:auto;
    padding:40px 20px;
}

/* HEADING */
h2{
    text-align:center;
    color:#333;
    margin-bottom:30px;
}

/* GRID */
.skills-grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
    gap:25px;
}

/* SKILL BOX */
.skill-box{
    background: linear-gradient(145deg, #ffffff, #f0f0f0);
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 8px rgba(0,0,0,0.1);
    transition:all 0.3s ease;
}

.skill-box:hover{
    transform: translateY(-8px) scale(1.03);
}

.skill-box h3{
    margin-top:0;
}

.skill-box ul{
    padding-left:20px;
}

/* ANIMATION */
.container{
    animation:fadeIn 1s ease-in;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<header>
<nav class="navbar">

<h3>Portfolio</h3>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="skills.html">Skills</a>
<a href="project.html">Projects</a>
<a href="certifications.html">Certifications</a>
<a href="resume.html">Resume</a>
<a href="contact.html">Contact</a>

</div>

</nav>
</header>

<main class="container">

<h2>My Skills</h2>

<div class="skills-grid">

<!-- FRONTEND -->
<div class="skill-box">
<h3>Frontend</h3>
<ul>
<li>HTML</li>
<li>CSS</li>
<li>JavaScript</li>
<li>React JS</li>
</ul>
</div>

<!-- BACKEND -->
<div class="skill-box">
<h3>Backend</h3>
<ul>
<li>Node.js</li>
<li>Express.js</li>
<li>Flask</li>
<li>Django</li>
</ul>
</div>

<!-- DATABASE -->
<div class="skill-box">
<h3>Database</h3>
<ul>
<li>MySQL</li>
<li>SQLite</li>
<li>MongoDB</li>
</ul>
</div>

<!-- LIBRARIES -->
<div class="skill-box">
<h3>Libraries & Tools</h3>
<ul>
<li>Tailwind CSS</li>
<li>SQLAlchemy</li>
<li>OpenCV</li>
</ul>
</div>

</div>

</main>

</body>
</html>
