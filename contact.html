<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact</title>

<style>

/* BODY */
body{
    margin:0;
    font-family:Arial, sans-serif;
    background: linear-gradient(135deg, #f5c6aa, #f7a1a1);
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 50px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.nav-links{
    display:flex;
    gap:25px;
}

.nav-links a{
    text-decoration:none;
    color:black;
    font-weight:500;
}

.nav-links a:hover{
    color:blue;
}

/* CONTAINER */
.container{
    max-width:900px;
    margin:auto;
    padding:40px 20px;
}

/* HEADING */
h2{
    text-align:center;
    color:#333;
    margin-bottom:30px;
}

/* CONTACT BOXES */
.contact-info{
    display:flex;
    gap:20px;
    margin-bottom:30px;
    flex-wrap:wrap;
}

.contact-box{
    background: linear-gradient(145deg, #ffffff, #f0f0f0);
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 8px rgba(0,0,0,0.1);
    flex:1;
    min-width:200px;
    text-align:center;
    transition:all 0.3s ease;
}

.contact-box:hover{
    transform: translateY(-8px) scale(1.03);
}

.contact-box a{
    text-decoration:none;
    color:black;
    font-weight:500;
}

/* FORM */
form{
    background: linear-gradient(145deg, #ffffff, #f0f0f0);
    padding:25px;
    border-radius:10px;
    box-shadow:0 4px 8px rgba(0,0,0,0.1);
    animation:fadeIn 1s ease-in;
}

form label{
    font-weight:bold;
}

form input, textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border-radius:5px;
    border:1px solid #ccc;
}

/* BUTTON */
button{
    background: linear-gradient(45deg, #ff6b6b, #ff4757);
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

/* ANIMATION */
.container{
    animation:fadeIn 1s ease-in;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<header>
<nav class="navbar">

<a href="certifications.html">Certifications</a>
<a href="resume.html">Resume</a>
<a href="contact.html">Contact</a>

</div>

</nav>
</header>

</div>

<p>+91-9392897747</p>
</div>

</div>


</main>

</body>
</html>
