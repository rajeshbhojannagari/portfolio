<!DOCTYPE html>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background-color:burlywood;
}

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 50px;
    background-color:#df7b7b;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.nav-links{
    display:flex;
    gap:25px;
}

.nav-links a{
    text-decoration:none;
    color:black;

}

}

.container{

    padding:40px 20px;
}

.contact-info{
    display:flex;
    gap:20px;
    margin-bottom:30px;
    flex-wrap:wrap;
}

.contact-box{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 8px rgba(0,0,0,0.1);
    flex:1;
    text-align:center;
}

.contact-box a{
    text-decoration:none;
    color:black;
}

form{
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 4px 8px rgba(0,0,0,0.1);
}

form label{
    font-weight:bold;
}

form input, textarea{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    background:#df7b7b;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
